services:
  # ── Backend Service (Django) ─────────────────────────────────────────────────
  - type: web
    name: hms-backend
    env: python
    rootDir: Backend
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --no-input"
    startCommand: "gunicorn hms_backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DJANGO_SETTINGS_MODULE
        value: hms_backend.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: hms-db
          property: connectionString

  # ── Frontend Service (React/Vite static site) ────────────────────────────────
  - type: web
    name: hms-frontend
    env: static
    rootDir: Frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://hms-backend.onrender.com/api"

databases:
  - name: hms-db
    databaseName: hms_db
    plan: free
