services:
  # ── Backend Service (Django) ─────────────────────────────────────────────────
  - type: web
    name: hms-backend
    runtime: python
    rootDir: Backend
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --no-input"
    startCommand: "gunicorn hms_backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: hms_backend.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: hms-db
          property: connectionString

  # ── Frontend Service (React/Vite) ────────────────────────────────────────────
  - type: static
    name: hms-frontend
    rootDir: Frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: hms-backend
          property: hostWithScheme
          suffix: /api

databases:
  - name: hms-db
    databaseName: hms_db
    plan: free
