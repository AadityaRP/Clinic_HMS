services:
  # Backend Service (Django)
  - type: web
    name: hms-backend
    runtime: python
    buildCommand: "./render_build.sh"
    startCommand: "cd Backend && gunicorn hms_backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DJANGO_SETTINGS_MODULE
        value: hms_backend.settings
      - key: DATABASE_URL
        fromDatabase:
          name: hms-db
          property: connectionString

  # Frontend Service (React/Vite)
  - type: static
    name: hms-frontend
    runtime: static
    buildCommand: "cd Frontend && npm install && npm run build"
    publishPath: "./Frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: hms-backend
          property: host

databases:
  - name: hms-db
    plan: free
